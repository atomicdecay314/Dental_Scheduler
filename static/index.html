<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dental Clinic Scheduler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: #1e40af;
      color: white;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.3px; }
    .clear-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 7px 16px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .clear-btn:hover { background: #dc2626; }

    /* ── Main layout ─────────────────────────────────────── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Chat panel ──────────────────────────────────────── */
    .chat-panel {
      width: 360px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: white;
      border-right: 1px solid #e2e8f0;
    }
    .chat-title {
      padding: 14px 16px 10px;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #f1f5f9;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      padding: 10px 14px;
      border-radius: 14px;
      max-width: 88%;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .msg.user {
      background: #1e40af;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      background: #f1f5f9;
      color: #1e293b;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #e2e8f0;
    }
    .input-row input {
      flex: 1;
      padding: 9px 13px;
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input:focus { border-color: #1e40af; }
    .send-btn {
      padding: 9px 18px;
      background: #1e40af;
      color: white;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .send-btn:hover { background: #1d4ed8; }
    .send-btn:disabled { background: #93c5fd; cursor: default; }

    /* ── Timetable panel ─────────────────────────────────── */
    .timetable-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 16px 20px;
    }
    .timetable-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .timetable-header h2 { font-size: 15px; font-weight: 700; color: #1e293b; }
    .date-nav { display: flex; align-items: center; gap: 8px; }
    .date-nav button {
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 7px;
      padding: 5px 11px;
      cursor: pointer;
      font-size: 16px;
      color: #475569;
      transition: border-color 0.15s;
    }
    .date-nav button:hover { border-color: #1e40af; color: #1e40af; }
    .date-label {
      font-size: 14px;
      font-weight: 600;
      color: #334155;
      min-width: 160px;
      text-align: center;
    }
    .timetable-scroll {
      flex: 1;
      overflow: auto;
      background: white;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: #f8fafc;
      padding: 11px 14px;
      text-align: center;
      border-bottom: 2px solid #e2e8f0;
      border-right: 1px solid #e2e8f0;
      font-weight: 700;
      color: #334155;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    thead th.time-th {
      width: 80px;
      background: #f8fafc;
    }
    tbody td {
      border-right: 1px solid #e2e8f0;
      border-bottom: 1px solid #f1f5f9;
      padding: 8px 10px;
      height: 58px;
      vertical-align: top;
    }
    tbody td.time-col {
      background: #f8fafc;
      font-weight: 600;
      color: #94a3b8;
      font-size: 12px;
      text-align: right;
      padding-right: 12px;
      vertical-align: middle;
      border-right: 2px solid #e2e8f0;
    }
    tbody td.free { background: white; }
    tbody td.booked { background: #eff6ff; }
    tbody tr:last-child td { border-bottom: none; }

    .booking-cell { font-size: 12px; line-height: 1.4; }
    .booking-cell .b-patient { font-weight: 700; color: #1e40af; }
    .booking-cell .b-room    { color: #64748b; font-size: 11px; }
    .booking-cell .b-proc    { color: #475569; margin-top: 1px; }

    .empty-state {
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
      padding: 40px;
    }

    .typing { color: #94a3b8; font-style: italic; font-size: 13px; padding: 6px 14px; }
  </style>
</head>
<body>

<header>
  <h1>🦷 Dental Clinic Scheduler</h1>
  <button class="clear-btn" onclick="clearAll()">Clear All Bookings</button>
</header>

<main>
  <!-- Chat panel -->
  <div class="chat-panel">
    <div class="chat-title">Receptionist Assistant</div>
    <div class="messages" id="messages"></div>
    <div class="input-row">
      <input
        type="text"
        id="chatInput"
        placeholder="e.g. Book a cleaning for Rahul on Friday 10am"
        onkeydown="if(event.key==='Enter') send()"
        autocomplete="off"
      />
      <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
    </div>
  </div>

  <!-- Timetable panel -->
  <div class="timetable-panel">
    <div class="timetable-header">
      <h2>Daily Schedule</h2>
      <div class="date-nav">
        <button onclick="shiftDate(-1)">&#8592;</button>
        <span class="date-label" id="dateLabel"></span>
        <button onclick="shiftDate(1)">&#8594;</button>
      </div>
    </div>
    <div class="timetable-scroll">
      <table id="timetable">
        <tbody><tr><td class="empty-state">Loading schedule…</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<script>
  const SESSION_ID = crypto.randomUUID();
  const HOURS = Array.from({length: 8}, (_, i) => i + 9); // 9am–4pm slots (end at 5pm)

  let currentDate = new Date();
  currentDate.setHours(0, 0, 0, 0);

  // ── Boot ──────────────────────────────────────────────────
  addMessage('bot', 'Hello! I can book appointments and check the schedule.\n\nTry: "Book a cleaning for Rahul Patil on Monday at 10am"');
  updateDateLabel();
  loadTimetable();

  // ── Date navigation ───────────────────────────────────────
  function shiftDate(days) {
    currentDate.setDate(currentDate.getDate() + days);
    updateDateLabel();
    loadTimetable();
  }

  function updateDateLabel() {
    const label = currentDate.toLocaleDateString('en-GB', {weekday: 'long', day: 'numeric', month: 'long'});
    document.getElementById('dateLabel').textContent = label;
  }

  function dateStr(d) {
    // Use local date parts to avoid UTC-shift across midnight in non-UTC timezones
    const y   = d.getFullYear();
    const m   = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  // ── Chat ──────────────────────────────────────────────────
  async function send() {
    const input = document.getElementById('chatInput');
    const btn   = document.getElementById('sendBtn');
    const msg   = input.value.trim();
    if (!msg) return;

    input.value = '';
    btn.disabled = true;
    addMessage('user', msg);

    const typing = addTyping();
    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({session_id: SESSION_ID, message: msg}),
      });
      const data = await res.json();
      typing.remove();
      addMessage('bot', data.reply);
      if (data.booking_date) {
        // Parse as local date — avoids UTC-shift moving it to the next day in IST
        const [y, mo, d] = data.booking_date.split('-').map(Number);
        currentDate = new Date(y, mo - 1, d);
        updateDateLabel();
      }
      loadTimetable();
    } catch {
      typing.remove();
      addMessage('bot', 'Connection error. Is the server running?');
    }
    btn.disabled = false;
    input.focus();
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    const box = document.getElementById('messages');
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.textContent = 'Assistant is thinking…';
    const box = document.getElementById('messages');
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  // ── Timetable ─────────────────────────────────────────────
  async function loadTimetable() {
    try {
      const [apptRes, docRes] = await Promise.all([
        fetch('/appointments'),
        fetch('/doctors'),
      ]);
      const appts   = await apptRes.json();
      const doctors = await docRes.json();
      renderTimetable(doctors, appts);
    } catch {
      document.getElementById('timetable').innerHTML =
        '<tbody><tr><td class="empty-state">Failed to load schedule.</td></tr></tbody>';
    }
  }

  function renderTimetable(doctors, appts) {
    const today = dateStr(currentDate);

    // Filter appointments to selected day using local date (avoids UTC-shift)
    const dayAppts = appts.filter(a => dateStr(new Date(a.start_time)) === today);

    // Build lookup: doctorId_hour → appointment
    const lookup = {};
    dayAppts.forEach(a => {
      const h = new Date(a.start_time).getHours();
      lookup[`${a.doctor.id}_${h}`] = a;
    });

    if (!doctors.length) {
      document.getElementById('timetable').innerHTML =
        '<tbody><tr><td class="empty-state">No doctors found.</td></tr></tbody>';
      return;
    }

    // Header
    let html = '<thead><tr><th class="time-th">Time</th>';
    doctors.forEach(d => { html += `<th>${d.name}</th>`; });
    html += '</tr></thead><tbody>';

    // Rows
    HOURS.forEach(h => {
      const label = h < 12 ? `${h}:00 AM` : h === 12 ? '12:00 PM' : `${h - 12}:00 PM`;
      html += `<tr><td class="time-col">${label}</td>`;

      doctors.forEach(d => {
        const a = lookup[`${d.id}_${h}`];
        if (a) {
          html += `<td class="booked">
            <div class="booking-cell">
              <div class="b-patient">${a.patient.name}</div>
              <div class="b-proc">${a.procedure.replace(/_/g, ' ')}</div>
              <div class="b-room">${a.room.name}</div>
            </div>
          </td>`;
        } else {
          html += `<td class="free"></td>`;
        }
      });

      html += '</tr>';
    });

    html += '</tbody>';
    document.getElementById('timetable').innerHTML = html;
  }

  // ── Clear all ─────────────────────────────────────────────
  async function clearAll() {
    if (!confirm('Delete all bookings? This cannot be undone.')) return;
    await fetch('/appointments', {method: 'DELETE'});
    await loadTimetable();
    addMessage('bot', 'All bookings have been cleared.');
  }
</script>
</body>
</html>
