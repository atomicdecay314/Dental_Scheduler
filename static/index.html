<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Apex Dental - Precision Scheduling</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary-fixed-variant": "#173bab",
            "on-surface-variant": "#444653",
            "surface": "#f9f9f9",
            "surface-container-low": "#f3f3f4",
            "on-primary": "#ffffff",
            "primary": "#00288e",
            "surface-muted": "#f9fafb",
            "primary-fixed": "#dde1ff",
            "clinical-blue-tint": "#eff6ff",
            "secondary": "#505f76",
            "outline": "#757684",
            "surface-container": "#eeeeee",
            "on-surface": "#1a1c1c",
            "on-primary-fixed": "#001453",
            "primary-container": "#1e40af",
            "border-subtle": "#e5e7eb"
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          spacing: {
            "base-unit": "8px",
            "stack-md": "16px",
            "stack-lg": "32px",
            "gutter": "24px"
          },
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"]
          },
          fontSize: {
            "body-lg":  ["18px", {lineHeight:"28px", fontWeight:"400"}],
            "headline-lg": ["32px", {lineHeight:"40px", letterSpacing:"-0.02em", fontWeight:"600"}],
            "label-md": ["14px", {lineHeight:"20px", fontWeight:"500"}],
            "headline-md": ["24px", {lineHeight:"32px", letterSpacing:"-0.01em", fontWeight:"600"}],
            "body-md":  ["16px", {lineHeight:"24px", fontWeight:"400"}],
            "label-sm": ["12px", {lineHeight:"16px", letterSpacing:"0.05em", fontWeight:"600"}]
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    /* Chat bubble tails */
    .bubble-bot::after {
      content: '';
      position: absolute;
      left: -7px; top: 12px;
      border-width: 7px 7px 7px 0;
      border-color: transparent #f3f3f4 transparent transparent;
      border-style: solid;
    }
    .bubble-user::after {
      content: '';
      position: absolute;
      right: -7px; top: 12px;
      border-width: 7px 0 7px 7px;
      border-color: transparent transparent transparent #1e40af;
      border-style: solid;
    }
    /* Typing dots */
    .typing-dot {
      width: 6px; height: 6px;
      background-color: #757684;
      border-radius: 50%;
      animation: dot-pulse 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-pulse {
      0%, 80%, 100% { transform: scale(0); }
      40%           { transform: scale(1); }
    }
    /* Scrollbar */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    /* Collapsible chat panel */
    #chat-panel.collapsed {
      width: 0 !important;
      overflow: hidden;
      border-right-width: 0;
    }
    #chat-panel.collapsed .chat-hide { display: none !important; }
  </style>
</head>
<body class="text-on-surface bg-surface-muted">

<!-- ── Header ─────────────────────────────────────────────── -->
<header class="sticky top-0 z-50 bg-surface flex justify-between items-center w-full px-6 h-16 border-b border-border-subtle">
  <div class="flex items-center gap-3">
    <button id="sidebar-toggle" class="p-2 mr-1 text-on-surface-variant hover:bg-surface-container-low rounded-lg transition-all">
      <span class="material-symbols-outlined" id="sidebar-toggle-icon">chevron_left</span>
    </button>
    <div class="w-9 h-9 rounded-lg bg-primary-container flex items-center justify-center">
      <span class="material-symbols-outlined text-white text-[20px]">dentistry</span>
    </div>
    <span class="text-headline-md font-bold text-primary">Apex Dental</span>
  </div>

  <!-- Date navigation -->
  <div class="flex items-center gap-base-unit bg-surface-container-low px-4 py-2 rounded-full border border-border-subtle">
    <button onclick="shiftDate(-1)" class="p-1 hover:bg-surface-container transition-colors rounded-full">
      <span class="material-symbols-outlined text-on-surface-variant">chevron_left</span>
    </button>
    <span id="dateLabel" class="text-label-md font-semibold text-on-surface mx-2 min-w-[180px] text-center"></span>
    <button onclick="shiftDate(1)" class="p-1 hover:bg-surface-container transition-colors rounded-full">
      <span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
    </button>
  </div>

  <!-- Actions -->
  <div class="flex items-center gap-3">
    <button onclick="clearAll()" class="flex items-center gap-2 px-4 py-2 border border-border-subtle text-on-surface-variant text-label-md rounded-lg hover:bg-red-50 hover:border-red-300 hover:text-red-600 transition-all">
      <span class="material-symbols-outlined text-[18px]">event_busy</span>
      Clear Bookings
    </button>
    <div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center border border-border-subtle">
      <span class="text-on-primary-fixed font-bold text-xs">RX</span>
    </div>
  </div>
</header>

<!-- ── Main ───────────────────────────────────────────────── -->
<main class="flex h-[calc(100vh-64px)] overflow-hidden">

  <!-- Chat panel -->
  <section id="chat-panel" class="w-[380px] flex-shrink-0 flex flex-col border-r border-border-subtle bg-white transition-all duration-300 ease-in-out relative">

    <!-- Chat header -->
    <div class="px-gutter py-3 border-b border-border-subtle flex items-center justify-between chat-hide">
      <div class="flex items-center gap-3">
        <div class="relative">
          <div class="w-9 h-9 rounded-full bg-clinical-blue-tint flex items-center justify-center border border-border-subtle">
            <span class="material-symbols-outlined text-primary text-[18px]">smart_toy</span>
          </div>
          <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-white rounded-full"></div>
        </div>
        <div>
          <h2 class="text-label-md font-bold text-on-surface">Receptionist AI</h2>
          <p class="text-[11px] text-green-600 font-medium">Online</p>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto p-gutter space-y-stack-md scrollbar-hide bg-[#fdfdfd] chat-hide"></div>

    <!-- Input -->
    <div class="p-gutter border-t border-border-subtle bg-white chat-hide">
      <div class="relative flex items-center transition-transform">
        <input
          id="chatInput"
          type="text"
          placeholder="e.g. Book a cleaning for Rahul on Friday 10am"
          autocomplete="off"
          onkeydown="if(event.key==='Enter') send()"
          class="w-full pl-4 pr-12 py-3 bg-white border border-border-subtle rounded-lg text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all"
        />
        <button id="sendBtn" onclick="send()" class="absolute right-2 p-2 bg-primary text-white rounded-md hover:bg-primary/90 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-default">
          <span class="material-symbols-outlined text-[20px]">send</span>
        </button>
      </div>
    </div>
  </section>

  <!-- Timetable panel -->
  <section class="flex-1 overflow-hidden flex flex-col bg-white">

    <!-- Timetable sub-header -->
    <div class="px-6 py-3 border-b border-border-subtle flex items-center justify-between bg-surface-container-low flex-shrink-0">
      <h2 class="text-label-md font-bold text-on-surface flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px] text-primary">calendar_month</span>
        Daily Schedule
      </h2>
      <div class="flex items-center gap-3">
        <p class="text-label-sm text-on-surface-variant uppercase tracking-wider">Doctor View</p>
        <div class="flex items-center gap-1.5 text-[11px] text-outline">
          <div class="w-4 h-3 rounded-sm border-l-2 flex-shrink-0" style="border-color:rgba(59,130,246,0.35);background:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(59,130,246,0.12) 3px,rgba(59,130,246,0.12) 6px)"></div>
          buffer
        </div>
      </div>
    </div>

    <!-- Grid -->
    <div class="flex-1 overflow-auto scrollbar-hide">
      <div id="timetable" class="text-[13px]">
        <div class="p-10 text-center text-outline">Loading schedule…</div>
      </div>
    </div>
  </section>
</main>

<script>
  const SESSION_ID = crypto.randomUUID();
  const HOURS = Array.from({length: 8}, (_, i) => i + 9); // 9 AM – 4 PM (end at 5 PM)

  let currentDate = new Date();
  currentDate.setHours(0, 0, 0, 0);

  // ── Boot ──────────────────────────────────────────────────
  addMessage('bot', 'Hello! I can book appointments and check the schedule.\n\nTry: "Book a cleaning for Rahul Patil on Monday at 10am"');
  updateDateLabel();
  loadTimetable();

  // Sidebar toggle
  document.getElementById('sidebar-toggle').addEventListener('click', () => {
    const panel = document.getElementById('chat-panel');
    const icon  = document.getElementById('sidebar-toggle-icon');
    panel.classList.toggle('collapsed');
    icon.textContent = panel.classList.contains('collapsed') ? 'chevron_right' : 'chevron_left';
  });

  // ── Date navigation ───────────────────────────────────────
  function shiftDate(days) {
    currentDate.setDate(currentDate.getDate() + days);
    updateDateLabel();
    loadTimetable();
  }

  function updateDateLabel() {
    document.getElementById('dateLabel').textContent =
      currentDate.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  }

  function dateStr(d) {
    const y   = d.getFullYear();
    const m   = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  // ── Chat ──────────────────────────────────────────────────
  async function send() {
    const input = document.getElementById('chatInput');
    const btn   = document.getElementById('sendBtn');
    const msg   = input.value.trim();
    if (!msg) return;

    input.value = '';
    btn.disabled = true;
    addMessage('user', msg);

    const typing = addTyping();
    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({session_id: SESSION_ID, message: msg}),
      });
      const data = await res.json();
      typing.remove();
      addMessage('bot', data.reply);
      if (data.booking_date) {
        const [y, mo, d] = data.booking_date.split('-').map(Number);
        currentDate = new Date(y, mo - 1, d);
        updateDateLabel();
      }
      loadTimetable();
    } catch {
      typing.remove();
      addMessage('bot', 'Connection error. Is the server running?');
    }
    btn.disabled = false;
    input.focus();
  }

  function addMessage(role, text) {
    const isBot = role === 'bot';
    const wrapper = document.createElement('div');
    wrapper.className = `flex flex-col ${isBot ? 'items-start' : 'items-end'} gap-1`;

    const bubble = document.createElement('div');
    bubble.className = `relative px-4 py-3 rounded-xl max-w-[88%] text-[14px] leading-relaxed whitespace-pre-wrap ${
      isBot
        ? 'bg-surface-container-low text-on-surface rounded-tl-sm bubble-bot'
        : 'bg-primary-container text-on-primary rounded-tr-sm bubble-user'
    }`;
    bubble.textContent = text;

    const ts = document.createElement('span');
    ts.className = 'text-[10px] text-outline ' + (isBot ? 'ml-1' : 'mr-1');
    ts.textContent = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});

    wrapper.appendChild(bubble);
    wrapper.appendChild(ts);

    const box = document.getElementById('messages');
    box.appendChild(wrapper);
    box.scrollTop = box.scrollHeight;
    return wrapper;
  }

  function addTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'flex items-center gap-2 px-1';
    wrapper.innerHTML = `
      <div class="flex gap-1 p-3 bg-surface-container-low rounded-full px-4">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
    const box = document.getElementById('messages');
    box.appendChild(wrapper);
    box.scrollTop = box.scrollHeight;
    return wrapper;
  }

  // ── Timetable ─────────────────────────────────────────────
  async function loadTimetable() {
    try {
      const [apptRes, docRes] = await Promise.all([
        fetch('/appointments'),
        fetch('/doctors'),
      ]);
      const appts   = await apptRes.json();
      const doctors = await docRes.json();
      renderTimetable(doctors, appts);
    } catch {
      document.getElementById('timetable').innerHTML =
        '<tbody><tr><td class="p-10 text-center text-outline">Failed to load schedule.</td></tr></tbody>';
    }
  }

  function renderTimetable(doctors, appts) {
    const PX_PER_HOUR = 80;
    const CLINIC_START_H = 9;
    const CLINIC_END_H   = 17;
    const TOTAL_HOURS    = CLINIC_END_H - CLINIC_START_H;
    const TOTAL_PX       = TOTAL_HOURS * PX_PER_HOUR;

    const today    = dateStr(currentDate);
    const isToday  = dateStr(new Date()) === today;
    const dayAppts = appts.filter(a => dateStr(new Date(a.start_time)) === today);

    if (!doctors.length) {
      document.getElementById('timetable').innerHTML =
        '<div class="p-10 text-center text-outline">No doctors found.</div>';
      return;
    }

    function toTop(dt) {
      return ((dt.getHours() - CLINIC_START_H) * 60 + dt.getMinutes()) / 60 * PX_PER_HOUR;
    }
    function fmtT(dt) {
      return dt.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
    }

    // Grid lines shared across all columns
    let gridLines = '';
    for (let i = 0; i <= TOTAL_HOURS; i++) {
      gridLines += `<div class="absolute left-0 right-0 border-t border-border-subtle pointer-events-none" style="top:${i * PX_PER_HOUR}px"></div>`;
    }
    for (let i = 0; i < TOTAL_HOURS; i++) {
      gridLines += `<div class="absolute left-0 right-0 border-t border-dashed border-gray-100 pointer-events-none" style="top:${i * PX_PER_HOUR + PX_PER_HOUR / 2}px"></div>`;
    }

    // "Now" line — only shown when viewing today
    let nowLine = '';
    if (isToday) {
      const now = new Date();
      const top = toTop(now);
      if (top >= 0 && top <= TOTAL_PX) {
        nowLine = `<div class="absolute left-0 right-0 z-20 pointer-events-none" style="top:${top}px">
          <div class="border-t-2 border-red-400 relative">
            <div class="absolute -left-1 -top-1.5 w-3 h-3 rounded-full bg-red-400"></div>
          </div>
        </div>`;
      }
    }

    // Time label column — labels sit 2px below the grid line so the first (9 AM) is never clipped
    let timeLabels = '';
    for (let i = 0; i < TOTAL_HOURS; i++) {
      const h = CLINIC_START_H + i;
      const label = h < 12 ? `${h}:00 AM` : h === 12 ? '12:00 PM' : `${h-12}:00 PM`;
      timeLabels += `<div class="absolute right-3 text-[11px] text-outline font-semibold whitespace-nowrap select-none"
                          style="top:${i * PX_PER_HOUR + 2}px">${label}</div>`;
    }
    // 5 PM end marker — right-aligned, above the last line
    timeLabels += `<div class="absolute right-3 text-[11px] text-outline font-semibold whitespace-nowrap select-none"
                        style="top:${TOTAL_HOURS * PX_PER_HOUR - 14}px">5:00 PM</div>`;

    // Doctor columns
    let doctorCols = '';
    doctors.forEach(doc => {
      const docAppts = dayAppts.filter(a => a.doctor.id === doc.id);

      let blocks = '';
      docAppts.forEach(a => {
        const start  = new Date(a.start_time);
        const end    = new Date(a.end_time);
        const top    = toTop(start);
        const height = Math.max((end - start) / 3600000 * PX_PER_HOUR - 2, 20);
        const cancelled = a.status === 'cancelled';

        // Store full data in global lookup so onclick can retrieve it safely (avoids JSON-in-attribute quoting issues)
        window._apptLookup = window._apptLookup || {};
        window._apptLookup[a.id] = {
          id:        a.id,
          patient:   a.patient.name,
          phone:     a.patient.phone  || '—',
          email:     a.patient.email  || '—',
          procedure: a.procedure.replace(/_/g,' '),
          start:     fmtT(start),
          end:       fmtT(end),
          room:      a.room.name,
          doctor:    a.doctor.name,
          status:    a.status,
        };

        const bufferMins = a.buffer_minutes || 0;

        if (cancelled) {
          blocks += `<div class="absolute inset-x-1 rounded-lg border-l-4 border-gray-300 bg-gray-50 px-2 py-1 opacity-50 overflow-hidden cursor-pointer"
                          style="top:${top}px;height:${height}px"
                          onclick="showApptPopup(event,${a.id})">
            <p class="font-medium text-[11px] text-gray-400 truncate line-through">${a.patient.name}</p>
            <p class="text-[10px] text-gray-400">${fmtT(start)} · cancelled</p>
          </div>`;
        } else {
          const showProcedure = height >= 36;
          const showMeta      = height >= 54;
          blocks += `<div class="absolute inset-x-1 rounded-lg border-l-4 border-primary-container bg-clinical-blue-tint shadow-sm px-2 py-1.5 overflow-hidden cursor-pointer hover:brightness-95 transition-all"
                          style="top:${top}px;height:${height}px"
                          onclick="showApptPopup(event,${a.id})">
            <p class="font-bold text-[12px] text-on-primary-fixed-variant truncate">${a.patient.name}</p>
            ${showProcedure ? `<p class="text-[11px] text-secondary capitalize truncate">${a.procedure.replace(/_/g,' ')}</p>` : ''}
            ${showMeta ? `<div class="flex items-center gap-1.5 mt-0.5 flex-wrap">
              <span class="text-[10px] text-outline">${fmtT(start)}–${fmtT(end)}</span>
              <span class="px-1.5 py-px bg-white/70 text-[9px] rounded text-primary font-bold uppercase">${a.room.name}</span>
            </div>` : ''}
          </div>`;
          // Buffer band immediately below the appointment block
          if (bufferMins > 0) {
            const bufTop    = top + height;
            const bufHeight = (bufferMins / 60) * PX_PER_HOUR;
            blocks += `<div class="absolute inset-x-1 rounded-b-md pointer-events-none"
              style="top:${bufTop}px;height:${bufHeight}px;background:repeating-linear-gradient(
                45deg,transparent,transparent 3px,rgba(59,130,246,0.08) 3px,rgba(59,130,246,0.08) 6px
              );border-left:2px solid rgba(59,130,246,0.2);"></div>`;
          }
        }
      });

      doctorCols += `<div class="flex-1 min-w-[160px] border-l border-border-subtle flex flex-col">
        <div class="px-4 py-3 border-b-2 border-border-subtle bg-surface-container-low text-center sticky top-0 z-10 flex-shrink-0">
          <p class="text-label-md font-bold text-on-surface">${doc.name}</p>
          <p class="text-[11px] text-outline uppercase tracking-wider mt-0.5">Doctor</p>
        </div>
        <div class="relative" style="height:${TOTAL_PX}px">
          ${gridLines}${nowLine}${blocks}
        </div>
      </div>`;
    });

    document.getElementById('timetable').innerHTML = `
      <div class="flex w-full">
        <div class="w-20 flex-shrink-0 border-r border-border-subtle flex flex-col">
          <div class="flex items-center justify-center border-b-2 border-border-subtle bg-surface-container-low sticky top-0 z-10 flex-shrink-0" style="height:52px">
            <span class="material-symbols-outlined text-outline text-[18px]">schedule</span>
          </div>
          <div class="relative bg-surface-muted" style="height:${TOTAL_PX}px">${timeLabels}</div>
        </div>
        <div class="flex flex-1">${doctorCols}</div>
      </div>`;
  }

  // ── Clear all ─────────────────────────────────────────────
  async function clearAll() {
    if (!confirm('Delete all bookings? This cannot be undone.')) return;
    await fetch('/appointments', {method: 'DELETE'});
    await loadTimetable();
    addMessage('bot', 'All bookings have been cleared.');
  }

  // ── Appointment detail popup ───────────────────────────────
  function showApptPopup(event, apptId) {
    event.stopPropagation();
    const d = window._apptLookup[apptId];
    if (!d) return;
    const popup = document.getElementById('appt-popup');

    const statusColor = d.status === 'cancelled'
      ? 'bg-gray-100 text-gray-500'
      : d.status === 'scheduled'
        ? 'bg-blue-50 text-blue-700'
        : 'bg-green-50 text-green-700';

    popup.innerHTML = `
      <div class="flex items-start justify-between mb-3">
        <div>
          <p class="font-bold text-[15px] text-on-surface">${d.patient}</p>
          <span class="inline-block mt-1 px-2 py-0.5 rounded-full text-[11px] font-semibold capitalize ${statusColor}">${d.status}</span>
        </div>
        <button onclick="hideApptPopup()" class="text-outline hover:text-on-surface ml-3 mt-0.5">
          <span class="material-symbols-outlined text-[18px]">close</span>
        </button>
      </div>
      <div class="space-y-2 text-[13px]">
        <div class="flex gap-2 items-start">
          <span class="material-symbols-outlined text-outline text-[16px] mt-0.5">stethoscope</span>
          <div><p class="text-outline text-[11px] uppercase tracking-wide font-semibold">Procedure</p>
               <p class="text-on-surface capitalize font-medium">${d.procedure}</p></div>
        </div>
        <div class="flex gap-2 items-start">
          <span class="material-symbols-outlined text-outline text-[16px] mt-0.5">schedule</span>
          <div><p class="text-outline text-[11px] uppercase tracking-wide font-semibold">Time</p>
               <p class="text-on-surface font-medium">${d.start} – ${d.end}</p></div>
        </div>
        <div class="flex gap-2 items-start">
          <span class="material-symbols-outlined text-outline text-[16px] mt-0.5">person</span>
          <div><p class="text-outline text-[11px] uppercase tracking-wide font-semibold">Doctor</p>
               <p class="text-on-surface font-medium">${d.doctor}</p></div>
        </div>
        <div class="flex gap-2 items-start">
          <span class="material-symbols-outlined text-outline text-[16px] mt-0.5">meeting_room</span>
          <div><p class="text-outline text-[11px] uppercase tracking-wide font-semibold">Room</p>
               <p class="text-on-surface font-medium">${d.room}</p></div>
        </div>
        ${d.phone !== '—' || d.email !== '—' ? `
        <div class="border-t border-border-subtle pt-2 mt-2 flex gap-2 items-start">
          <span class="material-symbols-outlined text-outline text-[16px] mt-0.5">contact_phone</span>
          <div><p class="text-outline text-[11px] uppercase tracking-wide font-semibold">Contact</p>
               ${d.phone !== '—' ? `<p class="text-on-surface">${d.phone}</p>` : ''}
               ${d.email !== '—' ? `<p class="text-on-surface">${d.email}</p>` : ''}
          </div>
        </div>` : ''}
      </div>
      ${d.status !== 'cancelled' ? `
      <div class="mt-4 pt-3 border-t border-border-subtle">
        <button onclick="cancelAppt(${d.id})"
          class="w-full flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg border border-red-200 text-red-600 text-[13px] font-medium hover:bg-red-50 transition-colors">
          <span class="material-symbols-outlined text-[16px]">event_busy</span>
          Cancel booking
        </button>
      </div>` : ''}`;

    // Position near click, keep within viewport
    const vw = window.innerWidth, vh = window.innerHeight;
    const pw = 272, ph = 280;
    let x = event.clientX + 12;
    let y = event.clientY - 20;
    if (x + pw > vw - 16) x = event.clientX - pw - 12;
    if (y + ph > vh - 16) y = vh - ph - 16;
    if (y < 8) y = 8;

    popup.style.left = x + 'px';
    popup.style.top  = y + 'px';
    popup.classList.remove('hidden');
  }

  function hideApptPopup() {
    document.getElementById('appt-popup').classList.add('hidden');
  }

  async function cancelAppt(id) {
    if (!confirm('Cancel this appointment? This cannot be undone.')) return;
    const res = await fetch(`/appointments/${id}/cancel`, { method: 'POST' });
    if (res.ok) {
      hideApptPopup();
      await loadTimetable();
    } else {
      const err = await res.json();
      alert('Failed to cancel: ' + (err.detail || 'unknown error'));
    }
  }

  document.addEventListener('click', (e) => {
    const popup = document.getElementById('appt-popup');
    if (!popup.classList.contains('hidden') && !popup.contains(e.target)) {
      hideApptPopup();
    }
  });
</script>

<!-- Appointment detail popup -->
<div id="appt-popup"
     class="hidden fixed z-[100] w-68 bg-white rounded-xl shadow-2xl border border-border-subtle p-4"
     style="width:272px">
</div>

</body>
</html>
